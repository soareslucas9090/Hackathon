{% extends "base_auth.html" %}
{% load i18n %}

{% block content %}
<!-- Busca -->
<div class="card shadow-sm mb-3">
  <div class="card-body">
    <form method="get" id="form-filtros-cat" class="row g-2 align-items-end">
      <div class="col-12 col-md-6">
        <label class="form-label small">{% trans "Buscar categoria" %}</label>
        <input type="text" name="busca" class="form-control form-control-sm" placeholder="{% trans "Ex: alimentação..." %}" value="{{ busca }}">
      </div>
      <div class="col-12 col-md-3 d-flex gap-2 align-self-end">
        <button type="submit" class="btn btn-sm btn-primary flex-fill">
          <i class="bi bi-search"></i> {% trans "Buscar" %}
        </button>
        <a href="{% url 'financeiro:categoria-lista' %}" class="btn btn-sm btn-outline-secondary">
          <i class="bi bi-x"></i>
        </a>
      </div>
    </form>
  </div>
</div>

<div class="d-flex justify-content-end mb-3">
  <a href="{% url 'financeiro:categoria-criar' %}" class="btn btn-primary">
    <i class="bi bi-plus-lg me-1"></i>{% trans "Nova Categoria" %}
  </a>
</div>

<div id="tabela-categorias">
  {% include "financeiro/lancamentos/partials/categoria_tabela.html" %}
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById("form-filtros-cat").addEventListener("submit", function (e) {
  e.preventDefault();
  const params = new URLSearchParams(new FormData(this));
  fetch("{% url 'financeiro:categoria-lista' %}?" + params.toString(), {
    headers: { "X-Requested-With": "XMLHttpRequest" }
  })
    .then(r => r.text())
    .then(html => { document.getElementById("tabela-categorias").innerHTML = html; })
    .catch(() => this.submit());
});
</script>
{% endblock %}
