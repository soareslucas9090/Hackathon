<div class="row g-3 mb-2">
  <div class="col-12 col-sm-4">
    <div class="card border-0 shadow-sm">
      <div class="card-body">
        <p class="text-muted small mb-1">Receitas</p>
        <h4 class="fw-bold text-success mb-0">R$ {{ saldo.receitas|floatformat:2 }}</h4>
      </div>
    </div>
  </div>
  <div class="col-12 col-sm-4">
    <div class="card border-0 shadow-sm">
      <div class="card-body">
        <p class="text-muted small mb-1">Despesas</p>
        <h4 class="fw-bold text-danger mb-0">R$ {{ saldo.despesas|floatformat:2 }}</h4>
      </div>
    </div>
  </div>
  <div class="col-12 col-sm-4">
    <div class="card border-0 shadow-sm">
      <div class="card-body">
        <p class="text-muted small mb-1">Saldo</p>
        <h4 class="fw-bold {% if saldo.saldo >= 0 %}text-primary{% else %}text-danger{% endif %} mb-0">
          R$ {{ saldo.saldo|floatformat:2 }}
        </h4>
      </div>
    </div>
  </div>
</div>
