{% load i18n %}
<div class="card shadow-sm">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>{% trans "Cor" %}</th>
            <th>{% trans "Nome" %}</th>
            <th>{% trans "Descrição" %}</th>
            <th class="text-end">{% trans "Ações" %}</th>
          </tr>
        </thead>
        <tbody>
          {% for cat in object_list %}
          <tr>
            <td>
              <span class="d-inline-block rounded-circle"
                    style="width:20px;height:20px;background-color:{{ cat.cor }};"></span>
            </td>
            <td>{{ cat.nome }}</td>
            <td class="text-muted small">{{ cat.descricao|default:"-" }}</td>
            <td class="text-end">
              <a href="{% url 'financeiro:categoria-editar' cat.pk %}" class="btn btn-sm btn-outline-secondary" title="{% trans "Editar" %}">
                <i class="bi bi-pencil"></i>
              </a>
              <button type="button"
                      class="btn btn-sm btn-outline-danger btn-excluir-cat"
                      data-url="{% url 'financeiro:categoria-excluir' cat.pk %}"
                      data-excluir-msg="{% blocktrans with nome=cat.nome %}Deseja realmente excluir a categoria “{{ nome }}”?{% endblocktrans %}"
                      data-bs-toggle="modal"
                      data-bs-target="#modalConfirmarExclusao"
                      title="{% trans "Excluir" %}">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
          {% empty %}
          <tr>
            <td colspan="4" class="text-center text-muted py-4">{% trans "Nenhuma categoria cadastrada." %}</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>
