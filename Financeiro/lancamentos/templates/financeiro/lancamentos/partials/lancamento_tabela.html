<div class="card shadow-sm">
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>Data</th>
            <th>Descrição</th>
            <th>Categoria</th>
            <th>Tipo</th>
            <th class="text-end">Valor</th>
            <th class="text-end">Ações</th>
          </tr>
        </thead>
        <tbody>
          {% for l in object_list %}
          <tr>
            <td>{{ l.data|date:"d/m/Y" }}</td>
            <td>{{ l.descricao }}</td>
            <td>
              <span class="badge rounded-pill" style="background-color:{{ l.categoria.cor }}">
                {{ l.categoria.nome }}
              </span>
            </td>
            <td>
              {% if l.tipo == "receita" %}
                <span class="badge bg-success">Receita</span>
              {% else %}
                <span class="badge bg-danger">Despesa</span>
              {% endif %}
            </td>
            <td class="text-end fw-semibold {% if l.tipo == 'receita' %}text-success{% else %}text-danger{% endif %}">
              R$ {{ l.valor|floatformat:2 }}
            </td>
            <td class="text-end">
              <a href="{% url 'financeiro:lancamento-editar' l.pk %}" class="btn btn-sm btn-outline-secondary" title="Editar">
                <i class="bi bi-pencil"></i>
              </a>
              <button type="button"
                      class="btn btn-sm btn-outline-danger btn-excluir"
                      data-url="{% url 'financeiro:lancamento-excluir' l.pk %}"
                      title="Excluir">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>
          {% empty %}
          <tr>
            <td colspan="6" class="text-center text-muted py-4">Nenhum lançamento encontrado.</td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
document.querySelectorAll(".btn-excluir").forEach(btn => {
  btn.addEventListener("click", function () {
    if (!confirm("Deseja realmente excluir este lançamento?")) return;
    fetch(this.dataset.url, {
      method: "POST",
      headers: {
        "X-CSRFToken": "{{ csrf_token }}",
        "Content-Type": "application/json"
      }
    })
      .then(r => r.json())
      .then(data => {
        if (data.success) location.reload();
        else alert(data.error || "Erro ao excluir.");
      });
  });
});
</script>
