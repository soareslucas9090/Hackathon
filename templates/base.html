<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- Anti-FOUC: aplica tema ANTES do CSS ser renderizado -->
    <script>document.documentElement.setAttribute('data-bs-theme', localStorage.getItem('theme') || 'light');</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestão Financeira Pessoal{% endblock %}</title>
    <!-- Bootstrap 5 CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --sidebar-bg: #1e1b4b;
            --sidebar-text: #c7d2fe;
            --sidebar-active: #4f46e5;
        }
        /* Fundo levemente acinzentado no modo claro (padrão do sistema) */
        [data-bs-theme="light"] {
            --bs-body-bg: #f1f5f9;
        }
        /* Sidebar mais sutil no modo noturno — menor saturação */
        [data-bs-theme="dark"] {
            --sidebar-bg: #1a1a2e;
        }
        /* Transição suave de cores — ativa APENAS durante o clique no toggle
           (a classe .theme-transitioning é adicionada/removida via JS,
            evitando flash de transição no carregamento da página) */
        html.theme-transitioning body,
        html.theme-transitioning .card,
        html.theme-transitioning .card-header,
        html.theme-transitioning .card-footer,
        html.theme-transitioning header,
        html.theme-transitioning footer,
        html.theme-transitioning #sidebar,
        html.theme-transitioning .nav-link,
        html.theme-transitioning .table,
        html.theme-transitioning .form-control,
        html.theme-transitioning .form-select,
        html.theme-transitioning .modal-content,
        html.theme-transitioning .alert,
        html.theme-transitioning .btn {
            transition: background-color 0.1s ease, color 0.07s ease,
                        border-color 0.18s ease, box-shadow 0.15s ease !important;
        }
    </style>
    <meta name="csrf-token" content="{{ csrf_token }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% block body %}
        {% block content %}{% endblock %}
    {% endblock %}

    <!-- Modal de Confirmação de Exclusão — reutilizável em todo o sistema -->
    <div class="modal fade" id="modalConfirmarExclusao" tabindex="-1"
         aria-labelledby="modalExcluirLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title text-danger" id="modalExcluirLabel">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>Confirmar Exclusão
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
                </div>
                <div class="modal-body py-2">
                    <p id="modalExcluirMensagem" class="mb-0">Deseja realmente excluir este item?</p>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="bi bi-x-lg me-1"></i>Cancelar
                    </button>
                    <button type="button" class="btn btn-danger" id="btnConfirmarExclusao">
                        <i class="bi bi-trash me-1"></i>Excluir
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- IMask.js — máscara de campos monetários -->
    <script src="https://cdn.jsdelivr.net/npm/imask@7.6.1/dist/imask.min.js"></script>
    {% block extra_js %}{% endblock %}

    <!-- ─── Dark Mode Toggle ──────────────────────────────────────────────── -->
    <script>
    (function () {
        function syncIcon(theme) {
            var btn = document.getElementById('btnToggleTema');
            if (!btn) return;
            var icon = btn.querySelector('i');
            if (theme === 'dark') {
                icon.className = 'bi bi-sun-fill';
                btn.setAttribute('title', 'Mudar para modo claro');
            } else {
                icon.className = 'bi bi-moon-fill';
                btn.setAttribute('title', 'Mudar para modo escuro');
            }
        }

        // Sincroniza ícone com o tema já aplicado pelo anti-FOUC
        var currentTheme = document.documentElement.getAttribute('data-bs-theme') || 'light';
        syncIcon(currentTheme);

        var btn = document.getElementById('btnToggleTema');
        if (btn) {
            btn.addEventListener('click', function () {
                var next = document.documentElement.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';

                // Ativa transições de cor apenas durante este ciclo de toggle
                document.documentElement.classList.add('theme-transitioning');
                setTimeout(function () {
                    document.documentElement.classList.remove('theme-transitioning');
                }, 350);

                document.documentElement.setAttribute('data-bs-theme', next);
                localStorage.setItem('theme', next);

                // Animação do ícone: encolhe + gira → troca → volta
                var icon = btn.querySelector('i');
                icon.style.transition = 'transform 0.15s ease, opacity 0.15s ease';
                icon.style.transform = 'scale(0) rotate(90deg)';
                icon.style.opacity = '0';
                setTimeout(function () {
                    syncIcon(next);
                    icon.style.transform = 'scale(1) rotate(0deg)';
                    icon.style.opacity = '1';
                }, 150);
            });
        }
    })();
    </script>

    <!-- JS genérico de exclusão via modal — funciona em todo o sistema -->
    <script>
    (function () {
        var _urlExcluir = null;
        var _modalEl = document.getElementById("modalConfirmarExclusao");

        // Bootstrap dispara show.bs.modal com relatedTarget = botão que abriu
        _modalEl.addEventListener("show.bs.modal", function (event) {
            var btn = event.relatedTarget;
            if (!btn) return;
            _urlExcluir = btn.dataset.url;
            var msg = btn.dataset.excluirMsg || "Deseja realmente excluir este item?";
            var msgEl = document.getElementById("modalExcluirMensagem");
            msgEl.textContent = msg;
            msgEl.classList.remove("text-danger");
            document.getElementById("btnConfirmarExclusao").disabled = false;
        });

        // Confirmar exclusão
        document.getElementById("btnConfirmarExclusao").addEventListener("click", function () {
            if (!_urlExcluir) return;
            var csrfToken = document.querySelector("meta[name='csrf-token']").getAttribute("content");
            fetch(_urlExcluir, {
                method: "POST",
                headers: {
                    "X-CSRFToken": csrfToken,
                    "Content-Type": "application/json"
                }
            })
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (data.success) {
                    location.reload();
                } else {
                    var msgEl = document.getElementById("modalExcluirMensagem");
                    msgEl.textContent = data.error || "Erro ao excluir.";
                    msgEl.classList.add("text-danger");
                    document.getElementById("btnConfirmarExclusao").disabled = true;
                }
            });
        });

        // Resetar estado ao fechar o modal
        _modalEl.addEventListener("hidden.bs.modal", function () {
            _urlExcluir = null;
            document.getElementById("btnConfirmarExclusao").disabled = false;
        });
    })();
    </script>
</body>
</html>
