{% extends "base.html" %}

{% block title %}404 — Página não encontrada{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <h1 class="display-1 fw-bold text-info">404</h1>
        <h2 class="mb-3">Página não encontrada</h2>
        <p class="text-muted mb-4">
            {{ error|default:"O registro ou página que você procura não existe ou foi removido." }}
        </p>
        <a href="/" class="btn btn-primary">Ir para o início</a>
    </div>
</div>
{% endblock %}
